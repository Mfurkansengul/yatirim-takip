<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Yatırım Takip Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030712;--sf:#0c1426;--sf2:#111f35;--sf3:#1a2d47;
  --b:#1e3050;--b2:#2a4060;
  --tx:#f0f6ff;--mu:#8ba5c4;--dm:#4d6a85;
  --go:#f5c842;--bl:#4d9fff;--gr:#2ecc8f;--re:#e05252;--pu:#9d72ff;--or:#f08030;
  --r:12px;--rs:8px;
}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--sf)}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
h1,h2,h3{font-family:'DM Serif Display',serif;letter-spacing:-.02em}
 
/* HEADER */
.hdr{border-bottom:1px solid var(--b);padding:14px 22px 0;position:sticky;top:0;background:rgba(3,7,18,.96);backdrop-filter:blur(14px);z-index:300}
.logo-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-family:'DM Serif Display',serif;font-size:19px;color:var(--go)}
.lu-badge{color:var(--dm);font-size:11px}
.tabs{display:flex;gap:2px;overflow-x:auto}
.tabs::-webkit-scrollbar{height:0}
.tab{background:none;color:var(--dm);border:1px solid transparent;border-radius:7px 7px 0 0;padding:7px 12px;cursor:pointer;font-size:12px;font-weight:600;margin-bottom:-1px;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--mu)}
.tab.on{background:var(--sf);color:var(--go);border-color:var(--b);border-bottom-color:var(--sf);font-weight:700}
 
/* CONTENT */
.con{padding:18px 22px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.ph h2{font-size:19px}
 
/* CARD */
.card{background:var(--sf);border:1px solid var(--b);border-radius:var(--r);padding:18px 20px;margin-bottom:14px}
.ct{font-size:11px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
 
/* STAT GRID */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:9px;margin-bottom:18px}
.sc{background:var(--sf);border:1px solid var(--b);border-radius:var(--r);padding:13px 15px;position:relative;overflow:hidden;transition:border-color .2s}
.sc:hover{border-color:var(--b2)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc,var(--bl))}
.sl{color:var(--dm);font-size:10px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;margin-bottom:5px}
.sv{font-size:18px;font-weight:800;line-height:1}
.ss{color:var(--dm);font-size:11px;margin-top:4px}
 
/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--dm);font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:7px 11px;border-bottom:1px solid var(--b);white-space:nowrap}
td{padding:10px 11px;border-bottom:1px solid rgba(30,48,80,.35);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(30,48,80,.18)}
.tf{margin-top:12px;padding-top:11px;border-top:1px solid var(--b);display:flex;gap:24px;flex-wrap:wrap}
 
/* BADGE */
.badge{border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:.7px;display:inline-block;white-space:nowrap}
.b-bk{background:#f59e0b18;color:#f59e0b;border:1px solid #f59e0b30}
.b-ak{background:#3b82f618;color:#60a5fa;border:1px solid #3b82f630}
.b-st{background:#10b98118;color:#2ecc8f;border:1px solid #10b98130}
 
/* COLORS */
.pos{color:var(--gr);font-weight:700}
.neg{color:var(--re);font-weight:700}
.gc{color:var(--go)}
.bc{color:var(--bl)}
.pc{color:var(--pu)}
 
/* BUTTONS */
.btn{border-radius:var(--rs);padding:7px 13px;cursor:pointer;font-weight:700;font-size:12px;font-family:'DM Sans',sans-serif;border:none;transition:all .15s;letter-spacing:.2px}
.bg{background:#2ecc8f22;color:#2ecc8f;border:1px solid #2ecc8f40}
.bb{background:#4d9fff22;color:#4d9fff;border:1px solid #4d9fff40}
.bgo{background:#f5c84222;color:#f5c842;border:1px solid #f5c84240}
.bp{background:#9d72ff22;color:#9d72ff;border:1px solid #9d72ff40}
.br{background:#e0525222;color:#e05252;border:1px solid #e0525240}
.bgh{background:var(--sf2);color:var(--mu);border:1px solid var(--b2)}
.btn:hover{filter:brightness(1.15)}
.ib{background:var(--sf2);border:1px solid var(--b);border-radius:5px;padding:4px 7px;cursor:pointer;font-size:11px;transition:all .1s}
.ib:hover{border-color:var(--b2)}
.pb{background:#f5c84218;color:#f5c842;border:1px solid #f5c84230;border-radius:5px;padding:3px 8px;cursor:pointer;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;white-space:nowrap}
.pb:hover{background:#f5c84230}
 
/* EMPTY */
.empty{text-align:center;padding:44px 24px;color:var(--dm)}
.ei{font-size:36px;margin-bottom:10px;opacity:.6}
 
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:500;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(5px)}
.mo{background:#0b1829;border:1px solid var(--b2);border-radius:15px;padding:24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.7)}
.mo-sm{max-width:350px}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mt{font-family:'DM Serif Display',serif;font-size:17px}
.xb{background:none;border:none;color:var(--mu);cursor:pointer;font-size:19px;line-height:1;padding:2px 6px;border-radius:4px}
.xb:hover{color:var(--tx);background:var(--sf3)}
.ir{margin-bottom:13px}
.il{display:block;color:var(--mu);font-size:11px;font-weight:700;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
.if{width:100%;background:var(--sf2);border:1px solid var(--b2);border-radius:var(--rs);padding:9px 12px;color:var(--tx);font-size:14px;outline:none;font-family:'DM Sans',sans-serif;transition:border .15s}
.if:focus{border-color:var(--go)}
select.if{cursor:pointer}
select.if option{background:#0b1829}
.sb{width:100%;border:none;border-radius:var(--rs);padding:10px;cursor:pointer;font-weight:700;font-size:14px;font-family:'DM Sans',sans-serif;margin-top:5px;transition:all .15s}
.sb:hover{filter:brightness(1.1)}
.s-gr{background:var(--gr);color:#fff}
.s-bl{background:var(--bl);color:#fff}
.s-go{background:var(--go);color:#000}
.s-re{background:var(--re);color:#fff}
.s-pu{background:var(--pu);color:#fff}
.pv{background:var(--sf2);border-radius:8px;padding:11px 13px;margin-bottom:13px;display:flex;gap:22px;flex-wrap:wrap;border:1px solid var(--b)}
.pl{color:var(--dm);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.merr{color:var(--re);font-size:12px;margin-top:5px;display:none}
.mnote{color:var(--dm);font-size:12px;margin-bottom:14px;line-height:1.6}
 
/* CHARTS */
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.cb{background:var(--sf);border:1px solid var(--b);border-radius:var(--r);padding:16px 18px}
.cbt{font-size:11px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
 
/* BULK UPDATE */
.br-row{display:grid;grid-template-columns:1fr 145px 125px;gap:11px;align-items:center;padding:9px 0;border-bottom:1px solid rgba(30,48,80,.3)}
.bn{font-weight:600}
.bsub{color:var(--dm);font-size:11px;margin-top:2px}
.bi{background:var(--sf2);border:1px solid var(--b2);border-radius:var(--rs);padding:8px 10px;color:var(--tx);font-size:14px;outline:none;font-family:'DM Sans',sans-serif;width:100%;transition:border .15s}
.bi:focus{border-color:var(--go)}
.bcur{color:var(--dm);font-size:11px;text-align:right}
.sa-btn{background:var(--pu);color:#fff;border:none;border-radius:var(--r);padding:11px;cursor:pointer;font-weight:700;font-size:14px;font-family:'DM Sans',sans-serif;width:100%;margin-top:11px;transition:all .2s}
.sa-btn:hover{filter:brightness(1.1)}
.bst{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid var(--b)}
 
/* SETTINGS */
.ss-sec{margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid var(--b)}
.ss-sec:last-child{border-bottom:none;margin-bottom:0}
.ss-title{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.ss-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;flex-wrap:wrap;gap:10px}
.ss-label{font-weight:600}
.ss-sub{color:var(--dm);font-size:12px;margin-top:2px}
.dz{background:#180808;border:1px solid #4a1010;border-radius:var(--r);padding:16px 18px}
.dz .ss-title{color:var(--re)}
.pd{background:var(--sf2);border:1px solid var(--b);border-radius:var(--rs);padding:7px 11px;font-family:monospace;font-size:15px;letter-spacing:4px;color:var(--mu)}
.ia{border:2px dashed var(--b2);border-radius:var(--r);padding:26px;text-align:center;cursor:pointer;transition:all .2s;color:var(--dm)}
.ia:hover{border-color:var(--bl);color:var(--bl)}
.ia input{display:none}
 
/* ANALIZ METRICS */
.am{display:grid;grid-template-columns:repeat(auto-fit,minmax(138px,1fr));gap:9px;margin-bottom:16px}
.mc{background:var(--sf);border:1px solid var(--b);border-radius:var(--r);padding:13px 15px}
.ml{font-size:10px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.mv{font-size:16px;font-weight:800}
.msub{font-size:11px;color:var(--dm);margin-top:3px}
 
/* LOGIN EKRANI */
.login-wrap{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#0b1829;border:1px solid var(--b2);border-radius:16px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,.7)}
.login-logo{font-family:'DM Serif Display',serif;font-size:24px;color:var(--go);text-align:center;margin-bottom:6px}
.login-sub{text-align:center;color:var(--dm);font-size:12px;margin-bottom:28px}
.login-err{background:#1c0808;border:1px solid #e0525244;border-radius:var(--rs);padding:9px 13px;color:var(--re);font-size:12px;margin-bottom:14px;display:none}
.login-btn{width:100%;background:var(--go);color:#000;border:none;border-radius:var(--rs);padding:11px;font-weight:800;font-size:15px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px;transition:filter .15s}
.login-btn:hover{filter:brightness(1.1)}
.setup-step{display:none}
.setup-step.on{display:block}
 
#toast{position:fixed;bottom:18px;right:18px;z-index:2000;background:#0b1829;border:1px solid var(--b2);border-radius:var(--r);padding:11px 16px;font-size:13px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.6);transform:translateY(80px);opacity:0;transition:all .28s;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
#toast.s{border-left:3px solid var(--gr);color:var(--gr)}
#toast.e{border-left:3px solid var(--re);color:var(--re)}
#toast.i{border-left:3px solid var(--bl);color:var(--bl)}
 
/* NOTICE */
.notice{background:#151035;border:1px solid #4d2fff33;border-radius:var(--r);padding:10px 15px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.notice-ok{background:#0a1f12;border-color:#2ecc8f33}
 
/* RESPONSIVE */
@media(max-width:768px){
  .con{padding:13px}
  .hdr{padding:13px 13px 0}
  .cg2{grid-template-columns:1fr}
  .br-row{grid-template-columns:1fr 115px}
  .bcur{display:none}
  .sg{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){
  .tab{padding:6px 9px;font-size:11px}
  .am{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
 
<div id="login-wrap" class="login-wrap" style="display:none"></div>
 
<div class="hdr">
  <div class="logo-row">
    <span class="logo">⚡ Yatırım Takip Pro</span>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="sync-dot" title="Cloud sync kapalı" style="display:none;width:8px;height:8px;border-radius:50%;background:#888;transition:background .3s"></span>
      <span class="lu-badge" id="hdr-lu"></span>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="go('dash')">📊 Özet</button>
    <button class="tab" onclick="go('ha')">🚀 Halka Arz</button>
    <button class="tab" onclick="go('hisse')">📈 Hisseler</button>
    <button class="tab" onclick="go('altin')">✨ Altın</button>
    <button class="tab" onclick="go('analiz')">📉 Analiz</button>
    <button class="tab" onclick="go('fiyat')">💲 Fiyat Güncelle</button>
    <button class="tab" onclick="go('ayar')">⚙️ Ayarlar</button>
  </div>
</div>
 
<div class="con">
  <div id="p-dash"></div>
  <div id="p-ha"    style="display:none"></div>
  <div id="p-hisse" style="display:none"></div>
  <div id="p-altin" style="display:none"></div>
  <div id="p-analiz"style="display:none"></div>
  <div id="p-fiyat" style="display:none"></div>
  <div id="p-ayar"  style="display:none"></div>
</div>
 
<div id="mc"></div>
<div id="toast"></div>
 
<script>
'use strict';
/* ══════════════════════════════════════════════════
   DATABASE + DEBOUNCE
   Her key için ayrı timer — hızlı ardışık yazmalarda
   sadece son değer kaydedilir (300ms pencere).
══════════════════════════════════════════════════ */
const LS = {
  get:(k,d=[])=>{ try{const v=localStorage.getItem(k); return v?JSON.parse(v):d;}catch{return d;} },
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
  str:(k,d='')=>localStorage.getItem(k)||d,
  put:(k,v)=>localStorage.setItem(k,v),
  del:(k)=>localStorage.removeItem(k),
};
 
const _dbTimers={};
function dbSave(key, val, immediate=false){
  clearTimeout(_dbTimers[key]);
  if(immediate){
    LS.set(key,val);
    cloudPush(); // anlık kayıtlarda hemen push
  } else {
    _dbTimers[key]=setTimeout(()=>{
      LS.set(key,val);
      cloudPush(); // debounce bittikten sonra push
    }, 300);
  }
}
 
/* ══════════════════════════════════════════════════
   CLOUD SYNC — Cloudflare Worker (URL sabit, kullanıcı adı/şifre ile çalışır)
══════════════════════════════════════════════════ */
let _pushTimer=null;
const WORKER_URL = 'https://yatirim-api.xfurkancox.workers.dev';
const CF = {
  url: ()=>WORKER_URL,
  user: ()=>LS.str('AU',''),
  pass: ()=>LS.str('PASS',''),
  on: ()=>!!LS.str('AU',''), // kullanıcı adı varsa sync aktif
};
 
// Push — veriyi buluta gönder (2sn debounce, üst üste gelenleri birleştirir)
function cloudPush(){
  if(!CF.on()) return;
  // Boş veri asla push edilmez — cloud'daki veriyi korur
  if(!HA.length && !HI.length && !AL.length) return;
  clearTimeout(_pushTimer);
  _pushTimer=setTimeout(async ()=>{
    try {
      const r=await fetch(CF.url()+'/sync',{
        method:'POST',
        headers:{'Content-Type':'application/json','X-User':CF.user(),'X-Pass':CF.pass()},
        body:JSON.stringify({HA,HI,AL,LU:LS.str('LU','')})
      });
      const d=await r.json();
      if(d.ok){
        document.getElementById('sync-dot')?.setAttribute('title','Son sync: '+new Date().toLocaleTimeString('tr-TR'));
        setSyncStatus('ok');
      } else {
        setSyncStatus('err',d.err);
      }
    } catch(e){
      setSyncStatus('err','Bağlantı hatası');
    }
  }, 2000);
}
 
// Pull — buluttan veri çek (login sonrası)
async function cloudPull(){
  if(!CF.on()) return false;
  setSyncStatus('loading');
  try {
    const r=await fetch(CF.url()+'/sync',{
      method:'GET',
      headers:{'X-User':CF.user(),'X-Pass':CF.pass()}
    });
    const d=await r.json();
    if(d.ok&&d.data){
      HA=d.data.HA||[];HI=migrateHI(d.data.HI||[]);AL=d.data.AL||[];
      LS.set('HA',HA);LS.set('HI',HI);LS.set('AL',AL);
      if(d.data.LU)LS.put('LU',d.data.LU);
      setSyncStatus('ok');
      return true;
    } else if(d.err==='NOT_FOUND'){
      // İlk kez bu cihazdan — sadece local veri varsa push et, yoksa push etme
      const hasLocal = HA.length>0 || HI.length>0 || AL.length>0;
      if(hasLocal) cloudPush();
      setSyncStatus('ok');
      return true;
    } else {
      setSyncStatus('err',d.err);
      return false;
    }
  } catch(e){
    setSyncStatus('err','Bağlantı yok — offline mod');
    return false;
  }
}
 
function setSyncStatus(s,msg=''){
  const dot=document.getElementById('sync-dot');
  if(!dot)return;
  const map={ok:'#2ecc8f',err:'#e05252',loading:'#f5c842'};
  dot.style.background=map[s]||'#888';
  dot.title=s==='ok'?'Bulut sync aktif':s==='loading'?'Senkronize ediliyor...':'Sync hatası: '+msg;
}
 
// Worker bağlantısını test et
async function testCF(url,user,pass){
  try{
    const r=await fetch(url+'/ping');
    const d=await r.json();
    return d.ok;
  }catch{return false;}
}
// Acil/anlık kayıt gereken yerler için (silme, reset vs) immediate=true kullanılır
// Normal kayıtlar debounce ile
 
/* ══════════════════════════════════════════════════
   AUTH STATE
══════════════════════════════════════════════════ */
let _loggedIn = false; // session içi flag, sayfa kapatılınca sıfırlanır
 
/* ══════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════ */
let HA    = LS.get('HA');
let AL    = LS.get('AL');
let TAB   = 'dash';
let charts= {};
let eI=null, eT=null;
 
// HI veri modeli migration: eski düz format → yeni gruplu format
// Eski: {id,kod,sirket,tarih,alis,lot,guncel,tmt,notlar}
// Yeni: {id,kod,sirket,guncel,tmt,notlar,hedef,stop, islemler:[{id,tarih,alis,lot}]}
function migrateHI(data){
  return data.map(x=>{
    if(x.islemler) return x;
    return {
      id:x.id||uid_(), kod:x.kod||'', sirket:x.sirket||'',
      guncel:x.guncel||'', tmt:x.tmt||'', notlar:x.notlar||'',
      hedef:'', stop:'',
      islemler:[{id:uid_(), tarih:x.tarih||'', alis:x.alis||'', lot:x.lot||''}]
    };
  });
}
function uid_(){ return '_'+Math.random().toString(36).slice(2,9); }
let HI = migrateHI(LS.get('HI'));
 
/* ══════════════════════════════════════════════════
   HELPERS — tüm sayısal hesaplar buradan geçer
══════════════════════════════════════════════════ */
const n   = v => { const r=parseFloat(v); return isNaN(r)?0:r; };
const tl  = v => new Intl.NumberFormat('tr-TR',{style:'currency',currency:'TRY',maximumFractionDigits:2}).format(v||0);
const pct = v => v>=0?`<span class="pos">+${(v).toFixed(2)}%</span>`:`<span class="neg">${(v).toFixed(2)}%</span>`;
const pf  = v => v>=0?`<span class="pos">▲ ${tl(Math.abs(v))}</span>`:`<span class="neg">▼ ${tl(Math.abs(v))}</span>`;
const uid = ()=>uid_();
const bd  = s=>({bekliyor:'<span class="badge b-bk">Bekliyor</span>',aktif:'<span class="badge b-ak">Aktif</span>',satildi:'<span class="badge b-st">Satıldı</span>'}[s]||'');
const now = ()=>new Date().toLocaleDateString('tr-TR',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
 
/* ── Hesaplama Fonksiyonları ─────────────────────
   Bunlar her render'da her yerde aynı sonucu üretir.
───────────────────────────────────────────────── */
// Halka arz
const _ha_fiyat = x => x.durum==='satildi'&&x.cikis ? n(x.cikis) : (x.guncel ? n(x.guncel) : null);
const ha_krow   = x => { const f=_ha_fiyat(x); return f!==null ? (f-n(x.giris))*n(x.lot) : null; };
const ha_prow   = x => { const f=_ha_fiyat(x); return f!==null ? ((f-n(x.giris))/n(x.giris))*100 : null; };
const ha_kar    = (list=HA) => list.reduce((s,x)=>{ const k=ha_krow(x); return k!==null?s+k:s; }, 0);
const ha_maly   = (list=HA) => list.reduce((s,x)=> s+n(x.giris)*n(x.lot), 0);
 
// Hisse — yeni gruplu model
const hi_lot_x  = x => (x.islemler||[]).reduce((s,i)=>s+n(i.lot),0);
const hi_alis_x = x => {
  const list=x.islemler||[];
  const tc=list.reduce((s,i)=>s+n(i.alis)*n(i.lot),0);
  const tlt=hi_lot_x(x);
  return tlt>0?tc/tlt:0;
};
const hi_maly_x = x => (x.islemler||[]).reduce((s,i)=>s+n(i.alis)*n(i.lot),0);
const hi_krow   = x => { const a=hi_alis_x(x),l=hi_lot_x(x); return x.guncel&&l>0?(n(x.guncel)-a)*l:null; };
const hi_prow   = x => { const a=hi_alis_x(x); return x.guncel&&a>0?((n(x.guncel)-a)/a)*100:null; };
const hi_kar    = (list=HI) => list.reduce((s,x)=>{ const k=hi_krow(x); return k!==null?s+k:s; },0);
const hi_maly   = (list=HI) => list.reduce((s,x)=>s+hi_maly_x(x),0);
const hi_curr   = (list=HI) => list.reduce((s,x)=>x.guncel?s+n(x.guncel)*hi_lot_x(x):s+hi_maly_x(x),0);
const hi_tmt    = (list=HI) => list.reduce((s,x)=>x.tmt&&hi_lot_x(x)?s+n(x.tmt)*hi_lot_x(x):s,0);
 
// Altın
const al_krow = x => x.gf ? (n(x.gf)-n(x.af))*n(x.gram) : null;
const al_prow = x => x.gf ? ((n(x.gf)-n(x.af))/n(x.af))*100 : null;
const al_kar  = (list=AL) => list.reduce((s,x)=> x.gf ? s+(n(x.gf)-n(x.af))*n(x.gram) : s, 0);
const al_gram = (list=AL) => list.reduce((s,x)=> s+n(x.gram), 0);
const al_maly = (list=AL) => list.reduce((s,x)=> s+n(x.af)*n(x.gram), 0);
const al_curr = (list=AL) => list.reduce((s,x)=> x.gf ? s+n(x.gf)*n(x.gram) : s+n(x.af)*n(x.gram), 0);
 
// Toplam portföy
const top_kar  = () => ha_kar()+hi_kar()+al_kar();
const top_maly = () => ha_maly()+hi_maly()+al_maly();
const top_roi  = () => top_maly()>0 ? (top_kar()/top_maly())*100 : 0;

function toast(msg,type='i',dur=3000){
  const el=document.getElementById('toast');
  el.className=`show ${type}`;el.textContent=msg;
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),dur);
}

const TABS=['dash','ha','hisse','altin','analiz','fiyat','ayar'];
function go(tab){
  TAB=tab;

  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',TABS[i]===tab));
  if(tab!=='analiz') destroyCharts();
  render();
}

}

function destroyCharts(){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch{}});
  charts={};
}
 
function mkChart(id,cfg){
  const el=document.getElementById(id); if(!el)return;
  if(charts[id])charts[id].destroy();
  Chart.defaults.color='#8ba5c4';
  Chart.defaults.borderColor='#1e3050';
  charts[id]=new Chart(el.getContext('2d'),cfg);
}

  responsive:true,maintainAspectRatio:true,
  plugins:{legend:{labels:{color:'#8ba5c4',font:{family:"'DM Sans',sans-serif",size:11},boxWidth:10,padding:12}}},

    y:{ticks:{color:'#4d6a85',font:{family:"'DM Sans',sans-serif",size:10}},grid:{color:'#1e305033'}}
  }
};
 
function rAnaliz(){
  destroyCharts();
  const tk=top_kar(), roi=top_roi(), tt=hi_tmt(), ag=al_gram();
 
  let bestHA=null,bestHAv=-Infinity;
  HA.filter(x=>x.durum==='satildi'&&x.cikis).forEach(x=>{const k=ha_krow(x);if(k>bestHAv){bestHAv=k;bestHA=x;}});
  let bestHI=null,bestHIv=-Infinity;
  HI.filter(x=>x.guncel).forEach(x=>{const k=hi_krow(x);if(k>bestHIv){bestHIv=k;bestHI=x;}});
 
  document.getElementById('p-analiz').innerHTML=`
    <div class="ph"><h2>📉 Portföy Analizi</h2></div>

// ── Canlı Fiyat Çek ──
async function fetchLivePrices(){
  const btn=document.getElementById('live-btn');
  if(btn){btn.disabled=true;btn.textContent='⏳ Çekiliyor...';}
 
  // Ticker listesi oluştur
  // BIST hisseleri: KOD.IS (örn. TTKOM.IS)
  // Halka arz aktif olanlar: GENKM.IS, LXGYO.IS vb — kod büyük harf + .IS
  // Altın gram TL: XAUTRY=X (ons TL) ÷ 31.1035
  const hiTickers = HI.map(x=>x.kod.toUpperCase());
  const haTickers = HA.filter(x=>x.durum!=='satildi'&&x.kod).map(x=>x.kod.toUpperCase());
  const allTickers = [...new Set([...hiTickers,...haTickers])];
  const withGold = AL.length>0 ? [...allTickers,'ALTIN'] : allTickers;
 
  if(!withGold.length){
    toast('Fiyat çekilecek varlık yok','i');
    if(btn){btn.disabled=false;btn.textContent='📡 Fiyatları Çek';}
    return;
  }
 
  try {
    const r=await fetch(CF.url()+'/prices',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({tickers:withGold})
    });
    const d=await r.json();
    if(!d.ok){toast('Fiyat çekilemedi: '+d.err,'e');return;}
 
    const prices=d.prices;
    let updated=0;
 
    // Hisseleri güncelle
    HI.forEach(x=>{
      const t=x.kod.toUpperCase();
      if(prices[t]?.price){
        x.guncel=prices[t].price.toFixed(2);
        updated++;
      }
    });
 
    // Halka arz aktif olanları güncelle
    HA.filter(x=>x.durum!=='satildi'&&x.kod).forEach(x=>{
      const t=x.kod.toUpperCase();
      if(prices[t]?.price){
        x.guncel=prices[t].price.toFixed(2);
        updated++;
      }
    });
 
    // Altın gram TL
    if(prices['ALTIN']?.price){
      const gramTL=prices['ALTIN'].price.toFixed(2);
      AL=AL.map(x=>({...x,gf:gramTL}));
      updated++;
    }
 
    if(updated===0){
      toast('Fiyat bulunamadı — hisse kodlarını kontrol et','e');
    } else {
      dbSave('HI',HI,true);dbSave('HA',HA,true);dbSave('AL',AL,true);
      LS.put('LU',now());
      toast(`✓ ${updated} fiyat güncellendi`,'s');
      render();
    }
  } catch(e){
    toast('Bağlantı hatası: '+e.message,'e');
  } finally {
    if(btn){btn.disabled=false;btn.textContent='📡 Fiyatları Çek';}
  }
}
 
function saveAll(){
  // HA güncelle
  HA.filter(x=>x.durum!=='satildi').forEach((x,i)=>{
    const v=document.getElementById('bha'+i)?.value;
    if(v){ const idx=HA.findIndex(h=>h.id===x.id); if(idx>=0)HA[idx].guncel=v; }
  });
  dbSave('HA',HA);
  // Hisse güncelle
  HI.forEach((_,i)=>{const v=document.getElementById('bhi'+i)?.value;if(v)HI[i].guncel=v;});
  dbSave('HI',HI);
  // Altın güncelle
  const av=document.getElementById('bal')?.value;
  if(av){AL=AL.map(x=>({...x,gf:av}));dbSave('AL',AL);}
  const t=now();LS.put('LU',t);
  const btn=document.querySelector('.sa-btn');
  if(btn){btn.textContent='✓ Kaydedildi!';btn.style.background='var(--gr)';setTimeout(()=>{btn.textContent='✓ Tüm Fiyatları Kaydet';btn.style.background='var(--pu)';},2200);}
  toast('Fiyatlar güncellendi — tüm hesaplamalar yenilendi','s');
  render();
}

        <div style="background:var(--sf2);border:1px solid var(--b2);border-radius:var(--rs);padding:14px;border-top:2px solid var(--bl)">

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">

          <button class="sb s-bl" style="margin-top:10px" onclick="svHisseInfo(${idx})">💾 Bilgileri Kaydet</button>

}
 
function pvNI(idx){
  const x=HI[idx];
  const a=n(document.getElementById('nim_a')?.value), l=n(document.getElementById('nim_l')?.value);
  const el=document.getElementById('nim_pv'); if(!el)return;
  if(!a||!l){el.innerHTML='';return;}
  const yeniLot=hi_lot_x(x)+l;
  const yeniCost=hi_maly_x(x)+a*l;
  const yeniOrt=yeniLot>0?yeniCost/yeniLot:0;
  el.innerHTML=`<div class="pv" style="border-color:#4d9fff33;background:#4d9fff08">
    <div><div class="pl">Bu Alım</div><b style="color:var(--mu)">${tl(a*l)}</b></div>
    <div><div class="pl">Yeni Ort.</div><b style="color:var(--go)">${tl(yeniOrt)}</b></div>
    <div><div class="pl">Yeni Toplam</div><b class="bc">${yeniLot.toLocaleString('tr-TR')} lot</b></div>
  </div>`;
}
 
function addIslem(idx){
  const t=document.getElementById('nim_t')?.value;
  const a=document.getElementById('nim_a')?.value;
  const l=document.getElementById('nim_l')?.value;
  if(!a||!l){toast('Fiyat ve lot zorunlu','e');return;}
  if(!HI[idx].islemler)HI[idx].islemler=[];
  HI[idx].islemler.push({id:uid(),tarih:t||'',alis:a,lot:l});
  dbSave('HI',HI);LS.put('LU',now());
  toast(`${HI[idx].kod} — yeni alım eklendi ✓`,'s');
  hiDetay(idx); // modal güncelle
  render();     // arka plan güncelle
}
 
function dIslem(hIdx,iIdx){
  if((HI[hIdx].islemler||[]).length<=1){toast('Son alımı silemezsin — hisseyi tamamen silmek için 🗑 kullan','e');return;}
  if(!confirm('Bu alımı silmek istiyor musun?'))return;
  HI[hIdx].islemler.splice(iIdx,1);
  dbSave('HI',HI);
  toast('Alım silindi','i');
  hiDetay(hIdx);
  render();
}
 
function svHedefStop(idx){
  HI[idx].hedef=document.getElementById('hd_hedef')?.value||'';
  HI[idx].stop=document.getElementById('hd_stop')?.value||'';
  dbSave('HI',HI);
  toast('Hedef/Stop kaydedildi ✓','s');
  hiDetay(idx);render();
}
 
function svHisseInfo(idx){
  const kod=document.getElementById('hd_kod')?.value.trim();
  if(!kod){toast('Kod zorunlu','e');return;}
  HI[idx].kod=kod;
  HI[idx].sirket=document.getElementById('hd_sir')?.value||'';
  HI[idx].guncel=document.getElementById('hd_gun')?.value||'';
  HI[idx].tmt=document.getElementById('hd_tmt')?.value||'';
  HI[idx].notlar=document.getElementById('hd_not')?.value||'';
  dbSave('HI',HI);LS.put('LU',now());
  toast('Hisse bilgileri kaydedildi ✓','s');
  hiDetay(idx);render();
}
 
function qHI(idx){
  const x=HI[idx];
  const ort=hi_alis_x(x), lot=hi_lot_x(x), k=hi_krow(x);
  showModal(`
    <div class="mh"><h3 class="mt">💲 ${x.kod} Güncel Fiyat</h3><button class="xb" onclick="cM()">✕</button></div>
    <div style="color:var(--dm);font-size:12px;margin-bottom:14px">Ort. Alış: <b style="color:var(--mu)">${tl(ort)}</b> · ${lot} lot · Maliyet: ${tl(hi_maly_x(x))}</div>
    ${x.guncel?`<div style="margin-bottom:12px;font-size:12px;color:var(--dm)">Mevcut: <b style="color:var(--mu)">${tl(n(x.guncel))}</b> · K/Z: <span class="${k>=0?'pos':'neg'}">${tl(k)}</span></div>`:''}
    <div class="ir"><label class="il">Yeni Güncel Fiyat (TL)</label><input type="number" class="if" id="qv" value="${x.guncel||''}" placeholder="0.00" step="0.01"></div>
    <div id="qpv"></div>
    <button class="sb s-go" onclick="svQHI(${idx})">Kaydet</button>`,
    ()=>{
      document.getElementById('qv').oninput=function(){
        const k2=(n(this.value)-ort)*lot;
        const p2=ort?((n(this.value)-ort)/ort)*100:0;
        document.getElementById('qpv').innerHTML=this.value?`<div class="pv" style="border-color:${k2>=0?'#2ecc8f44':'#e0525244'};background:${k2>=0?'#2ecc8f11':'#e0525211'}">
          <div><div class="pl">Kar/Zarar</div><span class="${k2>=0?'pos':'neg'}" style="font-size:16px">${tl(k2)}</span></div>
          <div><div class="pl">%</div>${pct(p2)}</div>
        </div>`:'';
      };

    }

function svQHI(idx){
  const v=document.getElementById('qv').value;if(!v)return cM();
  HI[idx].guncel=v;dbSave('HI',HI);LS.put('LU',now());
  cM();toast(`${HI[idx].kod} güncellendi — K/Z: ${tl(hi_krow(HI[idx]))}`, hi_krow(HI[idx])>=0?'s':'e');
  render();
}
 
function qAL(idx){
  const x=AL[idx];
  showModal(`
    <div class="mh"><h3 class="mt">💲 Gram Altın Fiyatı</h3><button class="xb" onclick="cM()">✕</button></div>
    <div style="color:var(--dm);font-size:12px;margin-bottom:14px">Tüm ${AL.length} altın kaydına uygulanır — Toplam ${al_gram().toFixed(3)} gr</div>
    ${x.gf?`<div style="margin-bottom:12px;font-size:12px;color:var(--dm)">Mevcut fiyat: <b style="color:var(--mu)">${tl(n(x.gf))}</b> · K/Z: <span class="${al_kar()>=0?'pos':'neg'}">${tl(al_kar())}</span></div>`:''}
    <div class="ir"><label class="il">Yeni Gram Fiyatı (TL)</label><input type="number" class="if" id="qv" value="${x.gf||''}" placeholder="0.00" step="1"></div>
    <div id="qpv"></div>
    <button class="sb s-go" onclick="svQAL()">Kaydet</button>`,
    ()=>{
      document.getElementById('qv').oninput=function(){
        const gf=n(this.value);
        const k=AL.reduce((s,a)=>gf?s+(gf-n(a.af))*n(a.gram):s,0);
        document.getElementById('qpv').innerHTML=this.value?`<div class="pv" style="border-color:${k>=0?'#f5c84244':'#e0525244'};background:${k>=0?'#f5c84211':'#e0525211'}"><div><div class="pl">Toplam K/Z</div><span class="${k>=0?'pos':'neg'}" style="font-size:16px">${tl(k)}</span></div><div><div class="pl">Güncel Değer</div><b class="gc">${tl(gf*al_gram())}</b></div></div>`:'';
      };
      document.getElementById('qv').dispatchEvent(new Event('input'));
      document.getElementById('qv').focus();
    }
  );
}
function svQAL(){
  const v=document.getElementById('qv').value;if(!v)return cM();
  AL=AL.map(x=>({...x,gf:v}));dbSave('AL',AL);
  const t=now();LS.put('LU',t);
  cM();toast(`Altın güncellendi — K/Z: ${tl(al_kar())}`, al_kar()>=0?'s':'e');
  render();
}
 
function qHA(idx){
  const x=HA[idx];
  const isSold=x.durum==='satildi';
  showModal(`
    <div class="mh"><h3 class="mt">💲 ${x.sirket}</h3><button class="xb" onclick="cM()">✕</button></div>
    <div style="color:var(--dm);font-size:12px;margin-bottom:14px">Giriş: <b style="color:var(--mu)">${tl(n(x.giris))}</b> · ${x.lot} lot · Maliyet: ${tl(n(x.giris)*n(x.lot))}</div>
    <div class="ir"><label class="il">Durum</label>
      <select class="if" id="qhd" onchange="qhaToggle()">
        <option value="bekliyor" ${x.durum==='bekliyor'?'selected':''}>Bekliyor</option>
        <option value="aktif" ${x.durum==='aktif'?'selected':''}>Aktif</option>
        <option value="satildi" ${x.durum==='satildi'?'selected':''}>Satıldı</option>
      </select>
    </div>
    <div id="qha_g" style="display:${!isSold?'':'none'}">
      <div class="ir"><label class="il">Güncel Piyasa Fiyatı (TL) <span style="color:var(--dm);font-weight:400;text-transform:none;letter-spacing:0">satmadan tahmini kar için</span></label>
        <input type="number" class="if" id="qhg" value="${x.guncel||''}" placeholder="0.00" step="0.01"></div>
    </div>
    <div id="qha_c" style="display:${isSold?'':'none'}">
      <div class="ir"><label class="il">Satış Fiyatı (TL)</label>
        <input type="number" class="if" id="qhc" value="${x.cikis||''}" placeholder="0.00" step="0.01"></div>
    </div>
    <div id="qpv"></div>
    <button class="sb s-gr" onclick="svQHA(${idx})">Kaydet</button>`,
    ()=>{
      const upd=()=>{
        const sold=document.getElementById('qhd')?.value==='satildi';
        const fv=sold?n(document.getElementById('qhc')?.value):n(document.getElementById('qhg')?.value);
        if(!fv)return;
        const k=(fv-n(x.giris))*n(x.lot), p=((fv-n(x.giris))/n(x.giris))*100;
        document.getElementById('qpv').innerHTML=`<div class="pv" style="border-color:${k>=0?'#2ecc8f44':'#e0525244'};background:${k>=0?'#2ecc8f11':'#e0525211'}">
          <div><div class="pl">${sold?'Realize Kar':'Tahmini Kar'}</div><span class="${k>=0?'pos':'neg'}" style="font-size:16px">${tl(k)}</span></div>
          <div><div class="pl">%</div>${pct(p)}</div></div>`;
      };
      document.getElementById('qhg')?.addEventListener('input',upd);
      document.getElementById('qhc')?.addEventListener('input',upd);
      upd();
      (document.getElementById('qhg')||document.getElementById('qhc'))?.focus();
    }
  );
}
function qhaToggle(){
  const sold=document.getElementById('qhd')?.value==='satildi';
  document.getElementById('qha_g').style.display=sold?'none':'';
  document.getElementById('qha_c').style.display=sold?'':'none';
  document.getElementById('qpv').innerHTML='';
}
function svQHA(idx){
  const d=document.getElementById('qhd').value;
  const sold=d==='satildi';
  const fv=sold?document.getElementById('qhc')?.value:document.getElementById('qhg')?.value;
  HA[idx].durum=d;
  if(sold){ if(fv)HA[idx].cikis=fv; delete HA[idx].guncel; }
  else { if(fv)HA[idx].guncel=fv; HA[idx].cikis=''; }
  dbSave('HA',HA); LS.put('LU',now()); cM();
  const k=ha_krow(HA[idx]);
  toast(`${HA[idx].sirket} güncellendi${k!==null?' — '+(sold?'Realize':'Tahmini')+' K/Z: '+tl(k):''}`, k!==null&&k>=0?'s':'e');
  render();
}

function showModal(html, afterRender=null){
  document.getElementById('mc').innerHTML=`<div class="ov" onclick="if(event.target===this)cM()"><div class="mo mo-sm">${html}</div></div>`;
  if(afterRender)setTimeout(afterRender,40);
}
function cM(){document.getElementById('mc').innerHTML='';}

   CRUD MODALS
══════════════════════════════════════════════════ */
function oM(t,i=null){eT=t;eI=i;const item=i!==null?(t==='ha'?HA:t==='hi'?HI:AL)[i]:null;if(t==='ha')mHA(item);if(t==='hi')mHI(item);if(t==='al')mAL(item);}

function tcHA(){

  document.getElementById('hgr').style.display=sold?'none':'';
  pvHA();
}
function pvHA(){

        d=document.getElementById('hd')?.value,
        c=n(document.getElementById('hc')?.value),

function sHA(){

  const item={id:eI!==null?HA[eI].id:uid(),sirket:s,kod:k,tarih:t,giris:g,lot:l,durum:d,cikis:d==='satildi'?c:'',guncel:d!=='satildi'?gun:''};

function pvAL(){
  const g=n(document.getElementById('agram')?.value), a=n(document.getElementById('aaf')?.value),
        gf=n(document.getElementById('agf')?.value), el=document.getElementById('pval');
  if(!el)return;
  const maly=g*a;
  let html=`<div class="pv"><div><div class="pl">Maliyet</div><b style="color:var(--mu)">${tl(maly)}</b></div>`;
  if(gf&&a&&g){const k=(gf-a)*g,p=((gf-a)/a)*100;html+=`<div><div class="pl">Kar/Zarar</div>${pf(k)}</div><div><div class="pl">%</div>${pct(p)}</div><div><div class="pl">Güncel Değer</div><b class="gc">${tl(gf*g)}</b></div>`;}
  el.innerHTML=html+'</div>';
}
function sAL(){
  const t=document.getElementById('atar').value, g=document.getElementById('agram').value,
        a=document.getElementById('aaf').value, gf=document.getElementById('agf').value,
        nt=document.getElementById('anot').value;

}
function dAL(id){if(!confirm('Silmek istediğine emin misin?'))return;AL=AL.filter(x=>x.id!=id);dbSave('AL',AL,true);render();}

/* ══════════════════════════════════════════════════
   EXCEL EXPORT
══════════════════════════════════════════════════ */
function expXL(){
  if(typeof XLSX==='undefined'){toast('XLSX kütüphanesi yüklenemedi — internet bağlantısı gerekli','e');return;}
  const wb=XLSX.utils.book_new();
 
  const haHead=['ID','Şirket','Tarih','Giriş Fiyatı','Lot','Durum','Çıkış Fiyatı','Kar/Zarar TL'];
  const haRows=HA.map(x=>{const k=ha_krow(x);return[x.id,x.sirket,x.tarih,x.giris,x.lot,x.durum,x.cikis||'',k!==null?k:''];});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([haHead,...haRows]),'Halka Arz');
 
  const hiHead=['ID','Kod','Şirket','Güncel Fiyat','Temettü/Lot','Hedef','Stop','Notlar','Alımlar (tarih|alis|lot)'];
  const hiRows2=HI.map(x=>[x.id,x.kod,x.sirket||'',x.guncel||'',x.tmt||'',x.hedef||'',x.stop||'',x.notlar||'',(x.islemler||[]).map(i=>`${i.tarih||''}|${i.alis}|${i.lot}`).join('; ')]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([hiHead,...hiRows2]),'Hisseler');
 
  const alHead=['ID','Tarih','Gram','Alış TL/gr','Güncel TL/gr','Notlar'];
  const alRows=AL.map(x=>[x.id,x.tarih,x.gram,x.af,x.gf||'',x.not||'']);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([alHead,...alRows]),'Altin');
 
  XLSX.writeFile(wb,`yatirim-yedek-${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Excel dosyası indirildi ✓','s');
}
 
/* ══════════════════════════════════════════════════
   EXCEL IMPORT
══════════════════════════════════════════════════ */
function impXL(input){
  const file=input.files[0];if(!file)return;
  if(typeof XLSX==='undefined'){toast('XLSX kütüphanesi yüklenemedi','e');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      let imp={ha:0,hi:0,al:0};
 
      if(wb.SheetNames.includes('Halka Arz')){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets['Halka Arz']);
        if(rows.length){HA=rows.map(r=>({id:r['ID']||uid(),sirket:r['Şirket']||'',tarih:r['Tarih']||'',giris:String(r['Giriş Fiyatı']||''),lot:String(r['Lot']||''),durum:r['Durum']||'bekliyor',cikis:String(r['Çıkış Fiyatı']||'')}));dbSave('HA',HA);imp.ha=HA.length;}
      }
      if(wb.SheetNames.includes('Hisseler')){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets['Hisseler']);
        if(rows.length){HI=rows.map(r=>({id:r['ID']||uid(),kod:r['Kod']||'',sirket:r['Şirket']||'',tarih:r['Alış Tarihi']||'',alis:String(r['Alış Fiyatı']||''),lot:String(r['Lot']||''),guncel:String(r['Güncel Fiyat']||''),tmt:String(r['Temettü/Lot']||''),notlar:r['Notlar']||''}));dbSave('HI',HI);imp.hi=HI.length;}
      }
      if(wb.SheetNames.includes('Altin')){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets['Altin']);
        if(rows.length){AL=rows.map(r=>({id:r['ID']||uid(),tarih:r['Tarih']||'',gram:String(r['Gram']||''),af:String(r['Alış TL/gr']||''),gf:String(r['Güncel TL/gr']||''),not:r['Notlar']||''}));dbSave('AL',AL);imp.al=AL.length;}
      }
      toast(`İçe aktarıldı: ${imp.ha} HA · ${imp.hi} hisse · ${imp.al} altın ✓`,'s',4000);
      input.value='';render();
    }catch(err){toast('Dosya okunamadı. Geçerli bir yedek dosyası seç.','e');console.error(err);}
  };
  reader.readAsArrayBuffer(file);
}
 
/* ══════════════════════════════════════════════════
   CSV EXPORT
══════════════════════════════════════════════════ */
function expCSV(type){
  let rows,headers,filename;
  if(type==='ha'){
    headers=['Şirket','Tarih','Giriş Fiyatı','Lot','Durum','Çıkış Fiyatı','Kar/Zarar TL','%'];
    rows=HA.map(x=>{const k=ha_krow(x),p=ha_prow(x);return[x.sirket,x.tarih,x.giris,x.lot,x.durum,x.cikis||'',k!==null?k.toFixed(2):'',p!==null?p.toFixed(2):''];});
    filename='halka_arz.csv';
  }else if(type==='hi'){
    headers=['Kod','Şirket','Toplam Lot','Ort.Maliyet','Toplam Maliyet','Güncel Fiyat','Kar/Zarar TL','%','Tmt/Lot','Yıllık Tmt','Hedef','Stop','Notlar'];
    rows=HI.map(x=>{const k=hi_krow(x),p=hi_prow(x);return[x.kod,x.sirket||'',hi_lot_x(x),hi_alis_x(x).toFixed(2),hi_maly_x(x).toFixed(2),x.guncel||'',k!==null?k.toFixed(2):'',p!==null?p.toFixed(2):'',x.tmt||'',x.tmt?( n(x.tmt)*hi_lot_x(x)).toFixed(2):'',x.hedef||'',x.stop||'',x.notlar||''];});
    filename='hisseler.csv';
  }else{
    headers=['Tarih','Gram','Alış TL/gr','Maliyet','Güncel TL/gr','Güncel Değer','Kar/Zarar TL','%','Notlar'];
    rows=AL.map(x=>{const k=al_krow(x),p=al_prow(x),m=n(x.af)*n(x.gram),gd=x.gf?n(x.gf)*n(x.gram):null;return[x.tarih,x.gram,x.af,m.toFixed(2),x.gf||'',gd!==null?gd.toFixed(2):'',k!==null?k.toFixed(2):'',p!==null?p.toFixed(2):'',x.not];});
    filename='altin.csv';
  }
  const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download=filename;a.click();
  toast(`${filename} indirildi ✓`,'s');
}

function karDetay(){
  const hk=ha_kar(), hik=hi_kar(), ak=al_kar();
  const top=hk+hik+ak;
  const tm=top_maly();
  const roi=tm>0?(top/tm)*100:0;
 
  // Hisse satır satır
  const hiRows=HI.filter(x=>x.guncel).map(x=>{
    const k=hi_krow(x), p=hi_prow(x);
    return`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(30,48,80,.3)">

        <span style="font-size:10px;color:var(--dm);margin-left:7px">${hi_lot_x(x)} lot · ort. ${tl(hi_alis_x(x))}</span>

      </div>
    </div>`;
  }).join('')||'<div style="color:var(--dm);font-size:12px;padding:6px 0">Güncel fiyat girilmemiş</div>';
 
  // HA satır satır — satılmış (çıkış fiyatlı) + satılmamış (güncel fiyatlı)
  const haRows=HA.filter(x=>ha_krow(x)!==null).map(x=>{
    const k=ha_krow(x), p=ha_prow(x);
    const isRealize=x.durum==='satildi'&&x.cikis;
    return`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(30,48,80,.3)">
      <div>
        <span style="font-weight:700">${x.sirket}</span>
        <span style="font-size:10px;color:var(--dm);margin-left:7px">${isRealize?'realize':'tahmini'}</span>
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        ${pf(k)} ${pct(p)}

// ── Cloud URL Kaydet ──
async function saveCFUrl(){
  const url=document.getElementById('cf_url')?.value.trim().replace(/\/$/,'');
  if(!url){
    LS.del('CF_URL');
    const dot=document.getElementById('sync-dot');
    if(dot)dot.style.display='none';
    toast('Cloud sync kapatıldı','i');render();return;
  }
  // Basit format kontrolü
  if(!url.startsWith('http')){toast('Geçerli bir URL gir (https://...)','e');return;}
  toast('Test ediliyor...','i',2000);
  const ok=await testCF(url);
  if(!ok){toast('Worker\'a ulaşılamadı — URL\'i kontrol et','e');return;}
  LS.put('CF_URL',url);
  const dot=document.getElementById('sync-dot');
  if(dot){dot.style.display='block';setSyncStatus('ok');}
  toast('Cloud sync aktif ✓ — veriler senkronize ediliyor','s');
  cloudPush();
  render();
}
 
async function testCFNow(){
  const url=document.getElementById('cf_url')?.value.trim().replace(/\/$/,'');
  if(!url){toast('Önce URL gir','e');return;}
  toast('Test ediliyor...','i',2000);
  const ok=await testCF(url);
  toast(ok?'✓ Worker aktif ve yanıt veriyor':'✗ Worker\'a ulaşılamadı', ok?'s':'e');
}
 
/* ══════════════════════════════════════════════════
   AUTH — GİRİŞ SİSTEMİ
══════════════════════════════════════════════════ */
function authBoot(){
  const user=LS.str('AU','');
  const pass=LS.str('PASS','');
  if(!user||!pass){
    showSetup();
  } else {
    showLogin(user);
  }
}
 
/* İlk Kurulum */
function showSetup(){
  const el=document.getElementById('login-wrap');
  el.style.display='flex';
  el.innerHTML=`
    <div class="login-box">
      <div class="login-logo">⚡ Yatırım Takip Pro</div>
      <div class="login-sub">Yeni hesap oluştur</div>
      <div id="setup-err" class="login-err"></div>
      <div class="ir"><label class="il">Kullanıcı Adı</label>
        <input class="if" id="su_user" placeholder="muhammed" autocomplete="username">
      </div>
      <div class="ir"><label class="il">Şifre</label>
        <input type="password" class="if" id="su_pass" placeholder="En az 4 karakter" autocomplete="new-password">
      </div>
      <div class="ir"><label class="il">Şifre Tekrar</label>
        <input type="password" class="if" id="su_pass2" placeholder="Tekrar gir" autocomplete="new-password">
      </div>
      <button class="login-btn" onclick="doSetup()">Hesabı Oluştur →</button>
      <div style="text-align:center;margin-top:16px">
        <span style="color:var(--dm);font-size:12px">Zaten hesabın var mı?</span>
        <button onclick="showLoginFull()" style="background:none;border:none;color:var(--pu);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-left:5px;text-decoration:underline">Giriş Yap</button>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('su_user')?.focus(),80);
}
 
async function doSetup(){
  const u=document.getElementById('su_user').value.trim().toLowerCase();
  const p=document.getElementById('su_pass').value;
  const p2=document.getElementById('su_pass2').value;
  const err=document.getElementById('setup-err');
  if(!u){err.style.display='block';err.textContent='Kullanıcı adı zorunlu';return;}
  if(p.length<4){err.style.display='block';err.textContent='Şifre en az 4 karakter olmalı';return;}
  if(p!==p2){err.style.display='block';err.textContent='Şifreler uyuşmuyor';return;}
 
  // Cloud'da bu kullanıcı var mı kontrol et
  err.style.display='none';
  const btn=document.querySelector('.login-btn');
  if(btn){btn.disabled=true;btn.textContent='Kontrol ediliyor...';}
  try {
    const r=await fetch(WORKER_URL+'/sync',{
      method:'GET',
      headers:{'X-User':u,'X-Pass':p}
    });
    const d=await r.json();
    if(d.err==='Şifre yanlış'){
      // Kullanıcı var ama şifre yanlış
      err.style.display='block';
      err.textContent='Bu kullanıcı adı zaten kayıtlı — şifren yanlış';
      if(btn){btn.disabled=false;btn.textContent='Hesabı Oluştur →';}
      return;
    }
    // NOT_FOUND veya ok — ikisi de devam edebilir
    // NOT_FOUND: yeni kullanıcı, ok: aynı kullanıcı adı + doğru şifre (mevcut hesaba giriş)
    LS.put('AU',u);
    LS.put('PASS',p);
    _loggedIn=true;
    document.getElementById('login-wrap').style.display='none';
    if(d.ok && d.data){
      // Mevcut hesap — verileri yükle
      HA=d.data.HA||[];HI=migrateHI(d.data.HI||[]);AL=d.data.AL||[];
      LS.set('HA',HA);LS.set('HI',HI);LS.set('AL',AL);
      if(d.data.LU)LS.put('LU',d.data.LU);
      toast('☁ Mevcut hesabına bağlandın, veriler yüklendi ✓','s');
    } else {
      toast('Hesap oluşturuldu ✓','s');
    }
    render();
  } catch(e){
    // Offline — sadece local kaydet
    LS.put('AU',u);LS.put('PASS',p);
    _loggedIn=true;
    document.getElementById('login-wrap').style.display='none';
    render();
  }
}
 
/* Giriş Ekranı — mevcut cihaz (sadece şifre) */
 
function showLogin(user){
  const el=document.getElementById('login-wrap');
  el.style.display='flex';
  el.innerHTML=`
    <div class="login-box">
      <div class="login-logo">⚡ Yatırım Takip Pro</div>
      <div class="login-sub">Hoş geldin, <b style="color:var(--mu)">${user}</b></div>
      <div id="login-err" class="login-err"></div>
      <div class="ir"><label class="il">Şifre</label>
        <input type="password" class="if" id="li_pass" placeholder="••••••" autocomplete="current-password">
      </div>
      <button class="login-btn" onclick="doLogin()">Giriş Yap →</button>
      <div style="text-align:center;margin-top:16px;display:flex;justify-content:center;gap:16px">
        <button onclick="showForgot()" style="background:none;border:none;color:var(--dm);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif">Şifremi unuttum</button>
        <button onclick="showLoginFull()" style="background:none;border:none;color:var(--pu);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline">Farklı hesap</button>
      </div>
    </div>`;
  setTimeout(()=>{
    const inp=document.getElementById('li_pass');
    inp?.focus();
    inp?.addEventListener('keydown',e=>{ if(e.key==='Enter')doLogin(); });
  },80);
}
 
/* Giriş Ekranı — farklı cihaz / farklı hesap (kullanıcı adı + şifre) */
function showLoginFull(){
  const el=document.getElementById('login-wrap');
  el.style.display='flex';
  el.innerHTML=`
    <div class="login-box">
      <div class="login-logo">⚡ Yatırım Takip Pro</div>
      <div class="login-sub">Hesabınla giriş yap</div>
      <div id="login-err" class="login-err"></div>
      <div class="ir"><label class="il">Kullanıcı Adı</label>
        <input class="if" id="li_user" placeholder="muhammed" autocomplete="username">
      </div>
      <div class="ir"><label class="il">Şifre</label>
        <input type="password" class="if" id="li_pass" placeholder="••••••" autocomplete="current-password">
      </div>
      <button class="login-btn" onclick="doLoginFull()">Giriş Yap →</button>
      <div style="text-align:center;margin-top:16px">
        <button onclick="showSetup()" style="background:none;border:none;color:var(--dm);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline">← Yeni hesap oluştur</button>
      </div>
    </div>`;
  setTimeout(()=>{
    document.getElementById('li_user')?.focus();
    document.getElementById('li_pass')?.addEventListener('keydown',e=>{ if(e.key==='Enter')doLoginFull(); });
  },80);
}
 
async function doLoginFull(){
  const u=document.getElementById('li_user').value.trim().toLowerCase();
  const p=document.getElementById('li_pass').value;
  const err=document.getElementById('login-err');
  if(!u){err.style.display='block';err.textContent='Kullanıcı adı zorunlu';return;}
  if(!p){err.style.display='block';err.textContent='Şifre zorunlu';return;}
  const btn=document.querySelector('.login-btn');
  if(btn){btn.disabled=true;btn.textContent='Giriş yapılıyor...';}
  try {
    const r=await fetch(WORKER_URL+'/sync',{
      method:'GET',
      headers:{'X-User':u,'X-Pass':p}
    });
    const d=await r.json();
    if(!d.ok){
      err.style.display='block';
      err.textContent=d.err==='NOT_FOUND'?'Kullanıcı bulunamadı':d.err==='Şifre yanlış'?'Şifre yanlış':'Giriş başarısız';
      if(btn){btn.disabled=false;btn.textContent='Giriş Yap →';}
      return;
    }
    // Başarılı — verileri yükle
    LS.put('AU',u);LS.put('PASS',p);
    HA=d.data.HA||[];HI=migrateHI(d.data.HI||[]);AL=d.data.AL||[];
    LS.set('HA',HA);LS.set('HI',HI);LS.set('AL',AL);
    if(d.data.LU)LS.put('LU',d.data.LU);
    _loggedIn=true;
    document.getElementById('login-wrap').style.display='none';
    toast('☁ Giriş başarılı, veriler yüklendi ✓','s');
    render();
  } catch(e){
    err.style.display='block';
    err.textContent='Bağlantı hatası — tekrar dene';
    if(btn){btn.disabled=false;btn.textContent='Giriş Yap →';}
  }
}
 
async function doLogin(){
  const p=document.getElementById('li_pass').value;
  const stored=LS.str('PASS','');
  const err=document.getElementById('login-err');
  if(p!==stored){
    err.style.display='block';
    err.textContent='Yanlış şifre';
    document.getElementById('li_pass').value='';
    document.getElementById('li_pass').focus();
    return;
  }
  _loggedIn=true;
  document.getElementById('login-wrap').style.display='none';
  render();
  // Cloud sync varsa veriyi çek
  if(CF.on()){
    toast('☁ Bulut verisi çekiliyor...','i',2500);
    const ok=await cloudPull();
    if(ok){toast('☁ Senkronize edildi ✓','s');render();}
  }
}
 
function showForgot(){
  // Şifremi unuttum — güvenlik sorusu değil, cihazda veri varsa Excel indir & sıfırla
  const el=document.getElementById('login-wrap');
  el.innerHTML=`
    <div class="login-box">
      <div class="login-logo" style="font-size:20px">🔑 Şifremi Unuttum</div>
      <div style="color:var(--dm);font-size:12px;text-align:center;margin-bottom:20px;line-height:1.7">
        Şifren kurtarılamaz.<br>
        Tüm verileri <b style="color:var(--go)">Excel olarak yedekleyip</b><br>hesabı sıfırlayabilirsin.
      </div>
      <button class="login-btn" style="background:var(--re);color:#fff;margin-bottom:10px" onclick="emergencyReset()">⚠ Yedek Al ve Sıfırla</button>
      <button onclick="showLogin(LS.str('AU',''))" style="width:100%;background:none;border:1px solid var(--b2);border-radius:var(--rs);padding:10px;color:var(--mu);cursor:pointer;font-family:'DM Sans',sans-serif">← Geri Dön</button>
    </div>`;
}
 
function emergencyReset(){
  if(!confirm('Tüm veriler silinecek. Önce Excel yedek alınacak. Devam?'))return;
  expXL();
  setTimeout(()=>{
    ['HA','HI','AL','LU','AU','PASS'].forEach(k=>LS.del(k));
    HA=[];HI=[];AL=[];_loggedIn=false;
    showSetup();
    toast('Veriler silindi — yeni hesap oluştur','i',5000);
  },800);
}
 
/* Çıkış */
function logout(){
  _loggedIn=false;
  showLogin(LS.str('AU',''));
}
